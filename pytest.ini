[pytest]
# Configuración de pytest

# Directorio de tests
testpaths = tests

# Patrón de búsqueda de tests
python_files = test_*.py

# Mínimo de cobertura requerida
addopts = 
    -v
    --strict-markers
    --tb=short

# Marcadores personalizados
markers =
    slow: marca tests que son lentos (deseleccionar con -m 'not slow')
    integration: marca tests de integración
    unit: marca tests unitarios

# Timeout para tests (en segundos)
timeout = 300
